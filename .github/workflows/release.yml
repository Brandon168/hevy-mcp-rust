name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
            mcp_bin: hevy-mcp
            cli_bin: hevy-cli
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
            mcp_bin: hevy-mcp
            cli_bin: hevy-cli
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64
            mcp_bin: hevy-mcp
            cli_bin: hevy-cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            mcp_bin: hevy-mcp.exe
            cli_bin: hevy-cli.exe

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Run Tests
        # Only run tests on linux to save time and because mock server behavior is consistent
        if: matrix.platform.os == 'ubuntu-latest'
        run: cargo test --target ${{ matrix.platform.target }}

      - name: Package (Unix)
        if: matrix.platform.os != 'windows-latest'
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar czf ../../../hevy-mcp-${{ matrix.platform.suffix }}.tar.gz ${{ matrix.platform.mcp_bin }}
          tar czf ../../../hevy-cli-${{ matrix.platform.suffix }}.tar.gz ${{ matrix.platform.cli_bin }}
          cd -

      - name: Package (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          7z a ../../../hevy-mcp-${{ matrix.platform.suffix }}.zip ${{ matrix.platform.mcp_bin }}
          7z a ../../../hevy-cli-${{ matrix.platform.suffix }}.zip ${{ matrix.platform.cli_bin }}
          cd -

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.suffix }}
          path: |
            hevy-mcp-${{ matrix.platform.suffix }}.*
            hevy-cli-${{ matrix.platform.suffix }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            */*.tar.gz
            */*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
